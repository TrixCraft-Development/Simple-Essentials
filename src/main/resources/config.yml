settings:
  debug: true

# Spawn Settings
spawn:
  enforce-spawn-on-join: false
  broadcast_setspawn: true
  send_message_on_teleport: true
  location:
    world: "world"
    x: 0.0
    y: 64.0
    z: 0.0
    yaw: 0.0
    pitch: 0.0

# EnderChest Settings
enderchest:
  max_ids: 5
  default_slots: 27
  slots_per_id:
    "1": 27
    "2": 27
    "3": 36
    "4": 45
    "5": 54

# Moderation settings
moderation:
  broadcast_kicks: true
  broadcast_bans: true
  broadcast_unbans: true
  broadcast_unmutes: true